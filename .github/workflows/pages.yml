name: Deploy naar GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Bouw app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node installeren
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Dependencies installeren
        run: npm install

      - name: Tests draaien
        run: npm test

      - name: Lint draaien
        run: npm run lint

      - name: GitHub Pages voorbereiden
        uses: actions/configure-pages@v5

      - name: Statische app bouwen
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ github.event.repository.name != format('{0}.github.io', github.repository_owner) && format('/{0}', github.event.repository.name) || '' }}
        run: npm run build

      - name: GitHub Pages statische assets toestaan
        run: touch out/.nojekyll

      - name: Artifact uploaden
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    name: Publiceer app
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
